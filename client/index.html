<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парк аттракционов - Билеты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Парк<span>Билет</span></div>
                <div class="header-buttons">
                    <button id="createEventBtn" class="create-event-btn" style="display:none;">➕ Создать</button>
                    <div id="authButtons">
                        <button id="loginBtn" class="login-btn">Войти</button>
                        <button id="registerBtn" class="register-btn">Регистрация</button>
                    </div>
                    <div id="userMenu" style="display:none;">
                        <span id="userName">User</span>
                        <button id="logoutBtn" class="login-btn">Выйти</button>
                        <a href="/my-tickets" id="myTicketsLink">Мои билеты</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Контент -->
    <main>
        <div class="container">
            <h1>🎡 Аттракционы и мероприятия</h1>
            <div id="eventsGrid" class="events-grid">
                <!-- Загрузка... -->
            </div>
        </div>
    </main>

    <!-- Модалки -->
    <div id="loginModal" class="modal-overlay" style="display:none;">
        <div class="auth-modal">
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit" class="modal-submit">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" id="switchToRegister">Регистрация</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay" style="display:none;">
        <div class="auth-modal">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Имя" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Пароль" required>
                <input type="password" id="registerConfirm" placeholder="Подтвердите пароль" required>
                <button type="submit" class="modal-submit">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p>
        </div>
    </div>

    <!-- Скрипты -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
